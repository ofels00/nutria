};

const fmtDate = d => new Date(d+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"});

function calcMacros(p) {
  let bmr = p.gender==="male" ? 10*p.weight+6.25*p.height-5*p.age+5 : 10*p.weight+6.25*p.height-5*p.age-161;
  const tdee = Math.round(bmr*(ACTIVITY_FACTORS[p.activity]?.factor||1.55));
  const adj = GOAL_ADJUSTMENTS[p.goal]?.adj||0;
  const calories = Math.max(1200, tdee+adj);
  const protein = Math.round(p.weight*1.8);
  const fat = Math.round((calories*0.25)/9);
  const carbs = Math.round((calories-protein*4-fat*9)/4);
  return {calories, protein:Math.max(protein,50), carbs:Math.max(carbs,50), fat:Math.max(fat,30), tdee};
}

// ─── Animaciones ──────────────────────────────────────────────────────────────
function FadeIn({children,delay=0,y=14}){
  const ref=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    el.style.opacity="0";el.style.transform=`translateY(${y}px)`;
    const t=setTimeout(()=>{el.style.transition=`opacity 0.45s ease ${delay}s,transform 0.45s cubic-bezier(.4,0,.2,1) ${delay}s`;el.style.opacity="1";el.style.transform="translateY(0)";},20);
    return()=>clearTimeout(t);
  },[delay]);
  return React.createElement("div",{ref},children);
}

function SlideUp({children,show,onClose}){
  const [mounted,setMounted]=useState(false);const[vis,setVis]=useState(false);
  useEffect(()=>{
    if(show){setMounted(true);requestAnimationFrame(()=>requestAnimationFrame(()=>setVis(true)));}
    else{setVis(false);const t=setTimeout(()=>setMounted(false),350);return()=>clearTimeout(t);}
  },[show]);
  if(!mounted)return null;
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose?.()} style={{position:"fixed",inset:0,background:`rgba(20,30,10,${vis?0.72:0})`,backdropFilter:vis?"blur(6px)":"none",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300,transition:"all 0.35s"}}>
      <div style={{background:C.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:"520px",maxHeight:"90vh",overflowY:"auto",transform:vis?"translateY(0)":"translateY(100%)",transition:"transform 0.38s cubic-bezier(.4,0,.2,1)",border:`1px solid ${C.border}`,borderBottom:"none"}}>
        <div style={{width:"36px",height:"4px",background:C.border,borderRadius:"2px",margin:"10px auto 4px"}}/>
        {children}
      </div>
    </div>
  );
}

function PopIn({children,trigger}){
  const ref=useRef();const prev=useRef(trigger);
  useEffect(()=>{if(trigger!==prev.current&&ref.current)ref.current.animate([{transform:"scale(0.9)",opacity:0.6},{transform:"scale(1.06)"},{transform:"scale(1)",opacity:1}],{duration:380,easing:"cubic-bezier(.4,0,.2,1)"});prev.current=trigger;},[trigger]);
  return React.createElement("div",{ref},children);
}

function Toast({msg,onDone}){
  const ref=useRef();
  useEffect(()=>{if(!msg)return;const el=ref.current;if(!el)return;el.style.opacity="1";el.style.transform="translateX(-50%) translateY(0)";const t=setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(-12px)";setTimeout(onDone,350);},2400);return()=>clearTimeout(t);},[msg]);
  if(!msg)return null;
  return <div ref={ref} style={{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%) translateY(-12px)",background:C.accent,color:"#fff",padding:"11px 20px",borderRadius:"20px",fontSize:"18px",fontFamily:"Georgia,serif",zIndex:500,opacity:0,transition:"all 0.3s",whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(232,144,58,0.4)",fontWeight:700}}>{msg}</div>;
}

  const goalLabel=GOAL_ADJUSTMENTS[profile.goal]?.label||profile.goal;
  const actLabel=ACTIVITY_FACTORS[profile.activity]?.label||profile.activity;
  const barrierLabels=profile.barriers.map(b=>BARRIERS_OPTIONS.find(x=>x.id===b)?.label||b).join(", ");
  return `Eres NutrIA, una asistente nutricional y de bienestar psicológico, experta, cálida y motivadora. Hablas en español, tuteas siempre.

PERFIL DE ${profile.name.toUpperCase()}:
- Sexo: ${profile.gender==="female"?"Mujer":"Hombre"}, ${profile.age} años, ${profile.weight}kg, ${profile.height}cm
- Actividad: ${actLabel} · Objetivo: ${goalLabel}
- Metas: ${profile.calories} kcal · ${profile.protein}g proteína · ${profile.carbs}g carbos · ${profile.fat}g grasa
- Barreras: ${barrierLabels}

PERSONALIDAD: Eres como un amigo experto — directo, nunca juzgas, celebras los logros pequeños.
- Comer emocional/ansiedad → técnica 5-4-3-2-1, respiración diafragmática
- Antojos → distingue hambre real de emocional, da alternativas
- Culpa → normaliza con compasión, reencuadra

MODOS — responde SIEMPRE con JSON válido:
1. {"type":"meal","name":"","emoji":"","calories":0,"protein":0,"carbs":0,"fat":0,"feedback":"","tip":null,"mood_check":null}
2. {"type":"chat","message":""}
3. {"type":"support","message":""}`;
}

    goal:initialData?.goal||"", barriers:initialData?.barriers||[],
    avatar:initialData?.avatar||"naranja",
    customCalories:"",customProtein:"",customCarbs:"",customFat:"",useCustomMacros:false
  });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggleBarrier=id=>setForm(p=>({...p,barriers:p.barriers.includes(id)?p.barriers.filter(b=>b!==id):[...p.barriers,id]}));
  const preview=(form.weight&&form.height&&form.age&&form.gender&&form.activity&&form.goal)?calcMacros({...form,weight:parseFloat(form.weight),height:parseFloat(form.height),age:parseInt(form.age)}):null;
  const finalMacros=form.useCustomMacros&&form.customCalories?{calories:parseInt(form.customCalories)||0,protein:parseInt(form.customProtein)||0,carbs:parseInt(form.customCarbs)||0,fat:parseInt(form.customFat)||0}:preview;
  const canNext=[
    form.name.trim().length>0,
    !!(form.gender && form.age && parseFloat(form.age)>0 && form.weight && parseFloat(form.weight)>0 && form.height && parseFloat(form.height)>0 && form.activity),
    !!form.goal,
    form.barriers.length>0
  ];
  const STEPS=["Hola 👋","Tus datos","Tu objetivo","Tus barreras"];
  const finish=()=>{if(!finalMacros)return;setSaving(true);const profile={name:form.name.trim(),gender:form.gender,age:parseInt(form.age),weight:parseFloat(form.weight),height:parseFloat(form.height),activity:form.activity,goal:form.goal,barriers:form.barriers,avatar:form.avatar||"naranja",calories:finalMacros.calories,protein:finalMacros.protein,carbs:finalMacros.carbs,fat:finalMacros.fat,tdee:preview?.tdee||finalMacros.calories,createdAt:new Date().toISOString()};ST.set("nutria-profile",profile);setSaving(false);onComplete(profile);};
  const inp={background:C.surface,border:`1px solid ${C.border}`,borderRadius:"11px",padding:"11px 14px",fontSize:"18px",color:C.text,outline:"none",width:"100%"};
  const OptionBtn=({selected,onClick,children})=>(<button onClick={onClick} style={{padding:"11px 14px",borderRadius:"12px",cursor:"pointer",textAlign:"left",border:`1.5px solid ${selected?C.accent:C.border}`,background:selected?C.accent+"22":C.surfaceAlt,color:selected?C.accent:C.textMid,transition:"all 0.15s",width:"100%",display:"block"}}>{children}</button>);
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:"40px"}}>
      <div style={{width:"100%",maxWidth:"480px",padding:"32px 24px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:"8px"}}>
        <div style={{animation:"floatOtter 3s ease-in-out infinite"}}><OtterLogo size={64}/></div>
        <h1 style={{margin:"6px 0 0",fontSize:"36px",fontFamily:"Georgia,serif",fontWeight:700,color:C.surface}}>Nutr<span style={{color:C.accent}}>IA</span></h1>
        <div style={{fontSize:"18px",color:C.textOnDark,fontFamily:"Georgia,serif"}}>tu guía nutricional con IA</div>
        <div style={{display:"flex",gap:"6px",marginTop:"20px",alignItems:"center"}}>
          {STEPS.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:"6px"}}>
            <div style={{width:i===step?"24px":"8px",height:"8px",borderRadius:"4px",background:i<step?C.accentGreen:i===step?C.accent:C.textOnDarkDim,transition:"all 0.3s"}}/>
            {i<STEPS.length-1&&<div style={{width:"16px",height:"1px",background:C.textOnDarkDim}}/>}
          </div>))}
        </div>
        <div style={{fontSize:"18px",color:C.textOnDark,fontFamily:"Georgia,serif",marginTop:"4px"}}>Paso {step+1} de {STEPS.length} · {STEPS[step]}</div>
      </div>
      <div style={{width:"100%",maxWidth:"480px",padding:"24px 24px 0"}}>
        {step===0&&<FadeIn key="s0"><div style={{marginBottom:"28px"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:C.surface,marginBottom:"8px",fontWeight:600}}>¿Cómo te llamas?</div>
          <div style={{fontSize:"19px",color:C.textOnDark,lineHeight:1.6,marginBottom:"24px"}}>Soy NutrIA, tu asistente nutricional. Estoy aquí para ayudarte con apoyo real, no solo números.</div>
          <SLabel>Tu nombre</SLabel>
          <input autoFocus value={form.name} onChange={e=>set("name",e.target.value)} onKeyDown={e=>e.key==="Enter"&&form.name.trim()&&setStep(1)} placeholder="ej. María" style={inp}/>
          <div style={{marginTop:"20px"}}><SLabel>Elige tu nutria</SLabel>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",marginTop:"4px"}}>
            {AVATARS.map(av=>(
              <button key={av.id} onClick={()=>set("avatar",av.id)} title={av.name} style={{width:"52px",height:"52px",borderRadius:"50%",border:`2.5px solid ${form.avatar===av.id?C.accent:C.border}`,background:form.avatar===av.id?C.accent+"15":C.surfaceAlt,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",transform:form.avatar===av.id?"scale(1.12)":"scale(1)"}}>
                <OtterLogoColored size={38} body={av.body} belly={av.belly}/>
              </button>
            ))}
          </div>
          {form.avatar&&<div style={{textAlign:"center",fontSize:"18px",color:C.textMid,marginTop:"8px",fontFamily:"Georgia,serif",fontStyle:"italic",color:C.textOnDark}}>{AVATARS.find(a=>a.id===form.avatar)?.name}</div>}
          </div>
        </div></FadeIn>}
        {step===1&&<FadeIn key="s1"><div style={{marginBottom:"28px"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:C.surface,marginBottom:"6px",fontWeight:600}}>Tus datos físicos</div>
          <div style={{fontSize:"18px",color:C.textOnDark,marginBottom:"20px"}}>Para calcular tus necesidades calóricas con Mifflin-St Jeor.</div>
          <SLabel>Sexo biológico</SLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}}>
            {[["female","Mujer","♀"],["male","Hombre","♂"]].map(([v,l,ico])=>(<OptionBtn key={v} selected={form.gender===v} onClick={()=>set("gender",v)}><span style={{fontSize:"18px",marginRight:"8px"}}>{ico}</span><span style={{fontFamily:"Georgia,serif",fontSize:"19px"}}>{l}</span></OptionBtn>))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"16px"}}>
            {[["Edad","age","años","28"],["Peso","weight","kg","70"],["Altura","height","cm","165"]].map(([lbl,key,unit,ph])=>(<div key={key}><SLabel>{lbl}</SLabel><div style={{position:"relative"}}><input type="number" value={form[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} style={{...inp,paddingRight:"36px"}}/><span style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",fontSize:"18px",color:C.textMid,fontFamily:"Georgia,serif"}}>{unit}</span></div></div>))}
          </div>
          <SLabel>Nivel de actividad</SLabel>
          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            {Object.entries(ACTIVITY_FACTORS).map(([v,info])=>(<OptionBtn key={v} selected={form.activity===v} onClick={()=>set("activity",v)}><div style={{fontFamily:"Georgia,serif",fontSize:"18px",fontWeight:form.activity===v?600:400}}>{info.label}</div><div style={{fontSize:"18px",color:form.activity===v?C.accent:C.textMid,fontFamily:"Georgia,serif",marginTop:"1px"}}>{info.desc}</div></OptionBtn>))}
          </div>
        </div></FadeIn>}
        {step===2&&<FadeIn key="s2"><div style={{marginBottom:"28px"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:C.surface,marginBottom:"6px",fontWeight:600}}>¿Cuál es tu objetivo?</div>
          <div style={{fontSize:"18px",color:C.textOnDark,marginBottom:"20px"}}>Ajustaré tus calorías y macros automáticamente.</div>
          <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}}>
            {Object.entries(GOAL_ADJUSTMENTS).map(([v,info])=>(<OptionBtn key={v} selected={form.goal===v} onClick={()=>set("goal",v)}><div style={{fontFamily:"Georgia,serif",fontSize:"18px",fontWeight:form.goal===v?600:400}}>{info.label}</div><div style={{fontSize:"18px",color:form.goal===v?C.accent:C.textMid,fontFamily:"Georgia,serif",marginTop:"1px"}}>{info.desc}</div></OptionBtn>))}
          </div>
          {preview&&<Card style={{marginBottom:"16px",background:C.goodBg,border:`1px solid ${C.accentGreen}60`}}><div style={{fontSize:"18px",color:C.accentGreen,fontFamily:"Georgia,serif",fontWeight:700,marginBottom:"10px"}}>✓ Calorías calculadas · gasto diario {preview.tdee} kcal</div><MacroChips {...preview}/></Card>}
          {preview&&<div>
            <button onClick={()=>set("useCustomMacros",!form.useCustomMacros)} style={{width:"100%",padding:"10px 14px",background:form.useCustomMacros?C.surfaceAlt:C.surface,border:`1px solid ${C.border}`,borderRadius:"11px",cursor:"pointer",color:C.textMid,fontSize:"18px",fontFamily:"Georgia,serif",textAlign:"left"}}>{form.useCustomMacros?"▾":"▸"} Ajustar macros manualmente</button>
            {form.useCustomMacros&&<FadeIn delay={0.05}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:"8px",marginTop:"10px"}}>
              {[["Proteína","customProtein",preview.protein],["Grasa","customFat",preview.fat],["Carbos","customCarbs",preview.carbs]].map(([lbl,key,def])=>(<div key={key}><SLabel>{lbl} (g)</SLabel><input type="number" placeholder={String(def)} value={form[key]} onChange={e=>set(key,e.target.value)} style={{...inp,padding:"9px 10px"}}/></div>))}
              <div style={{gridColumn:"1/-1"}}><SLabel>Calorías totales</SLabel><input type="number" placeholder={String(preview.calories)} value={form.customCalories} onChange={e=>set("customCalories",e.target.value)} style={inp}/></div>
            </div></FadeIn>}
          </div>}
        </div></FadeIn>}
        {step===3&&<FadeIn key="s3"><div style={{marginBottom:"28px"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:C.surface,marginBottom:"6px",fontWeight:600}}>¿Cuáles son tus barreras?</div>
          <div style={{fontSize:"18px",color:C.textOnDark,marginBottom:"20px",lineHeight:1.6}}>Así puedo darte el apoyo adecuado. Selecciona todas las que apliquen.</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"20px"}}>
            {BARRIERS_OPTIONS.map(b=>{const sel=form.barriers.includes(b.id);return(<button key={b.id} onClick={()=>toggleBarrier(b.id)} style={{padding:"13px 12px",borderRadius:"12px",cursor:"pointer",border:`1.5px solid ${sel?C.accent:C.border}`,background:sel?C.accent+"22":C.surfaceAlt,display:"flex",alignItems:"center",gap:"8px",transition:"all 0.15s"}}><span style={{fontSize:"20px"}}>{b.emoji}</span><span style={{fontFamily:"Georgia,serif",fontSize:"18px",color:sel?C.accent:C.textMid,textAlign:"left"}}>{b.label}</span></button>);})}
          </div>
          {finalMacros&&form.barriers.length>0&&<FadeIn delay={0.1}><Card style={{background:C.goodBg,border:`1px solid ${C.accentGreen}60`}}>
            <div style={{fontSize:"18px",color:C.accentGreen,fontFamily:"Georgia,serif",fontWeight:600,marginBottom:"10px"}}>Todo listo, {form.name} 🦦</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"12px",fontSize:"18px",fontFamily:"Georgia,serif"}}>
              <div><span style={{color:C.textMid}}>Objetivo: </span><span style={{color:C.text}}>{GOAL_ADJUSTMENTS[form.goal]?.label}</span></div>
              <div><span style={{color:C.textMid}}>Actividad: </span><span style={{color:C.text}}>{ACTIVITY_FACTORS[form.activity]?.label}</span></div>
              <div><span style={{color:C.textMid}}>Barreras: </span><span style={{color:C.text}}>{form.barriers.length} identificadas</span></div>
              <div><span style={{color:C.textMid}}>Gasto diario: </span><span style={{color:C.text}}>{preview?.tdee} kcal</span></div>
            </div>
            <MacroChips {...finalMacros}/>
          </Card></FadeIn>}
        </div></FadeIn>}
        <div style={{display:"flex",gap:"10px",paddingBottom:"16px"}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"13px",background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:"12px",cursor:"pointer",color:C.textMid,fontSize:"19px"}}>← Atrás</button>}
          {step<3
            ?<div style={{flex:2,display:"flex",flexDirection:"column",gap:"5px"}}>
              {!canNext[step]&&<div style={{fontSize:"18px",color:C.textOnDark,fontFamily:"Georgia,serif",textAlign:"center",padding:"2px 0",fontWeight:600}}>
                {step===0?"Escribe tu nombre para continuar":step===1?(!form.gender?"Elige sexo biológico":!form.age||!form.weight||!form.height?"Rellena edad, peso y altura":!form.activity?"Elige nivel de actividad":""):step===2?"Elige tu objetivo":"Selecciona al menos una barrera"}
              </div>}
              <button onClick={()=>canNext[step]&&setStep(s=>s+1)} style={{width:"100%",padding:"13px",background:canNext[step]?C.accent:C.surfaceAlt,color:canNext[step]?"#fff":C.textMid,border:`1px solid ${canNext[step]?C.accent:C.border}`,borderRadius:"12px",cursor:canNext[step]?"pointer":"not-allowed",fontSize:"19px",fontFamily:"Georgia,serif",fontWeight:700,transition:"all 0.2s"}}>Continuar →</button>
            </div>
            :<button onClick={finish} disabled={saving||!finalMacros||form.barriers.length===0} style={{flex:2,padding:"13px",background:(!saving&&finalMacros&&form.barriers.length>0)?C.accentGreen:C.surfaceAlt,color:(!saving&&finalMacros&&form.barriers.length>0)?"#fff":C.textMid,border:"none",borderRadius:"12px",cursor:"pointer",fontSize:"19px",fontFamily:"Georgia,serif",fontWeight:700}}>{saving?"Guardando…":"¡Empezar con NutrIA! 🦦"}</button>}
        </div>
      </div>
    </div>
  );
}

// ─── Activity Panel ───────────────────────────────────────────────────────────
function ActivityPanel({activity,onChange,adjustedCal,profile}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState({steps:activity.steps||0,burnedCal:activity.burnedCal||0,workout:activity.workout||""});
  const stepsToKcal=s=>Math.round(s*KCAL_PER_STEP);
  const WORKOUTS=[{emoji:"🚶",label:"Caminar",met:3.5},{emoji:"🏃",label:"Correr",met:8},{emoji:"🚴",label:"Bici",met:7},{emoji:"🏊",label:"Natación",met:8},{emoji:"💪",label:"Gym",met:5},{emoji:"🧘",label:"Yoga",met:2.5},{emoji:"🥊",label:"HIIT",met:10},{emoji:"🎾",label:"Tenis",met:7}];
  const applyWorkout=w=>{const mins=draft.workoutMins||45;const kcal=Math.round(w.met*(profile?.weight||75)*(mins/60));setDraft(p=>({...p,workout:w.label,burnedCal:kcal,workoutEmoji:w.emoji}));};
  const save=()=>{onChange({...draft,burnedCal:draft.burnedCal||stepsToKcal(draft.steps),lastUpdated:new Date().toISOString()});setEditing(false);};
  const stepGoal=8000,stepPct=Math.min(100,Math.round((activity.steps||0)/stepGoal*100));
  return(<div>
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontSize:"18px",fontFamily:"Georgia,serif",color:C.textMid,}}>⚡ Actividad hoy</div>
        <button onClick={()=>setEditing(true)} style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"18px",fontFamily:"Georgia,serif",color:C.textMid}}>{activity.lastUpdated?"Actualizar":"+ Añadir"}</button>
      </div>
      {!activity.lastUpdated
        ?<div style={{display:"flex",alignItems:"center",gap:"10px"}}><div style={{fontSize:"28px",opacity:0.4}}>👟</div><div><div style={{fontSize:"18px",color:C.textMid,fontStyle:"italic"}}>Sin datos de actividad hoy</div><div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif",marginTop:"2px"}}>Añade tus pasos para ajustar tu meta</div></div></div>
        :<div>
          <div style={{marginBottom:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"5px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:"18px"}}>👟</span><span style={{fontSize:"22px",fontWeight:700,color:C.steps,fontFamily:"Georgia,serif"}}>{(activity.steps||0).toLocaleString("es-ES")}</span><span style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif"}}>pasos</span></div>
              <span style={{fontSize:"18px",color:stepPct>=100?C.accentGreen:C.textDim,fontFamily:"Georgia,serif",fontWeight:stepPct>=100?700:400}}>{stepPct}% de {stepGoal.toLocaleString("es-ES")}</span>
            </div>
            <div style={{height:"6px",background:C.surfaceAlt,borderRadius:"3px",overflow:"hidden"}}><div style={{height:"100%",width:`${stepPct}%`,background:stepPct>=100?C.accentGreen:C.steps,borderRadius:"3px",transition:"width 1s cubic-bezier(.4,0,.2,1)"}}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
            {[{icon:"🔥",label:"Quemadas",val:`${activity.burnedCal||stepsToKcal(activity.steps||0)} kcal`,color:C.accent},{icon:"➕",label:"Bonus",val:`+${Math.round((activity.burnedCal||stepsToKcal(activity.steps||0))*EXERCISE_RECOVER)} kcal`,color:C.accentGreen},{icon:"🎯",label:"Meta hoy",val:`${adjustedCal} kcal`,color:C.text}].map(s=>(
              <div key={s.label} style={{background:C.surfaceAlt,borderRadius:"10px",padding:"8px 10px",border:`1px solid ${C.border}`}}>
                <div style={{fontSize:"19px",marginBottom:"2px"}}>{s.icon}</div>
                <div style={{fontSize:"18px",fontWeight:700,color:s.color,fontFamily:"Georgia,serif",lineHeight:1}}>{s.val}</div>
                <div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif",marginTop:"2px"}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>}
    </Card>
    <SlideUp show={editing} onClose={()=>setEditing(false)}>
      <div style={{padding:"20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}><div style={{fontFamily:"Georgia,serif",fontWeight:700,color:C.text,fontSize:"19px"}}>⚡ Registrar actividad</div><button onClick={()=>setEditing(false)} style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:C.textMid}}>✕</button></div>
        <div style={{marginBottom:"18px"}}>
          <SLabel>👟 Pasos del día</SLabel>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
            <button onClick={()=>setDraft(p=>({...p,steps:Math.max(0,p.steps-500)}))} style={{width:"36px",height:"36px",borderRadius:"10px",background:C.surfaceAlt,border:`1px solid ${C.border}`,cursor:"pointer",fontSize:"18px",color:C.text}}>−</button>
            <input type="number" value={draft.steps} onChange={e=>setDraft(p=>({...p,steps:Math.max(0,parseInt(e.target.value)||0),burnedCal:0}))} style={{flex:1,padding:"10px",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.surfaceAlt,fontSize:"20px",color:C.steps,textAlign:"center",outline:"none",fontWeight:700}}/>
            <button onClick={()=>setDraft(p=>({...p,steps:p.steps+500}))} style={{width:"36px",height:"36px",borderRadius:"10px",background:C.surfaceAlt,border:`1px solid ${C.border}`,cursor:"pointer",fontSize:"18px",color:C.text}}>+</button>
          </div>
          <div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif",textAlign:"center"}}>≈ {stepsToKcal(draft.steps)} kcal quemadas por pasos</div>
        </div>
        <div style={{marginBottom:"18px"}}>
          <SLabel>💪 Entrenamiento (opcional)</SLabel>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",marginBottom:"10px"}}>
            {WORKOUTS.map(w=><button key={w.label} onClick={()=>applyWorkout(w)} style={{padding:"8px 4px",borderRadius:"10px",border:`1px solid ${draft.workout===w.label?C.accent:C.border}`,background:draft.workout===w.label?C.accent+"22":C.surfaceAlt,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>{w.emoji}</span><span style={{fontSize:"18px",fontFamily:"Georgia,serif",color:draft.workout===w.label?C.accent:C.textMid}}>{w.label}</span></button>)}
          </div>
          {draft.workout&&<div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>Duración (min):</div>
            <input type="number" value={draft.workoutMins||45} onChange={e=>{const m=parseInt(e.target.value)||45;const w=WORKOUTS.find(w=>w.label===draft.workout);const kcal=w?Math.round(w.met*(profile?.weight||75)*(m/60)):draft.burnedCal;setDraft(p=>({...p,workoutMins:m,burnedCal:kcal}));}} style={{width:"70px",padding:"8px",borderRadius:"9px",border:`1px solid ${C.border}`,background:C.surfaceAlt,fontSize:"18px",color:C.text,textAlign:"center",outline:"none"}}/>
            <div style={{fontSize:"18px",color:C.accent,fontFamily:"Georgia,serif",fontWeight:700}}>= {draft.burnedCal} kcal</div>
          </div>}
        </div>
        <div style={{background:C.goodBg,borderRadius:"12px",padding:"12px 14px",border:`1px solid ${C.accentGreen}60`,marginBottom:"16px"}}>
          <div style={{fontSize:"18px",color:C.accentGreen,fontFamily:"Georgia,serif",fontWeight:700,marginBottom:"4px"}}>✓ Meta ajustada</div>
          <div style={{fontSize:"18px",color:C.textMid}}>Base <span style={{color:C.text,fontWeight:700}}>{profile?.calories} kcal</span> + bonus <span style={{color:C.accentGreen,fontWeight:700}}>+{Math.round((draft.burnedCal||stepsToKcal(draft.steps))*EXERCISE_RECOVER)} kcal</span> = <span style={{color:C.accent,fontWeight:700}}>{(profile?.calories||0)+Math.round((draft.burnedCal||stepsToKcal(draft.steps))*EXERCISE_RECOVER)} kcal</span></div>
        </div>
        <button onClick={save} style={{width:"100%",padding:"13px",background:C.accent,color:"#fff",border:"none",borderRadius:"12px",fontSize:"19px",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:700}}>Guardar actividad ✓</button>
      </div>
    </SlideUp>
  </div>);
}

// ─── Barcode Scanner ──────────────────────────────────────────────────────────
function BarcodeScanner({onResult,onClose}){
  const videoRef=useRef();const[status,setStatus]=useState("starting");const[product,setProduct]=useState(null);const[manual,setManual]=useState("");const[fetching,setFetching]=useState(false);const streamRef=useRef();const intRef=useRef();
  useEffect(()=>{startCam();return stopCam;},[]);
  const stopCam=()=>{streamRef.current?.getTracks().forEach(t=>t.stop());clearInterval(intRef.current);};

            <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:C.accentGreen,animation:"scanLine 1.5s ease-in-out infinite"}}/>
          </div>

      </div>

// ─── Monthly Tracker ──────────────────────────────────────────────────────────
function MonthlyTracker({profile}){
  const[data,setData]=useState({});const[vm,setVm]=useState(monthKey());const[loading,setLoading]=useState(true);const[showModal,setShowModal]=useState(false);const[form,setForm]=useState({weight:"",mood:3,notes:"",calories:""});const[saving,setSaving]=useState(false);const[showChart,setShowChart]=useState(false);
  useEffect(()=>{const v=ST.get("nutria-monthly");if(v)setData(v);setLoading(false);},[]);
  const persist=u=>{setData(u);ST.set("nutria-monthly",u);};
  const logToday=()=>{setSaving(true);const mk=monthKey(),dk=todayKey();const u=JSON.parse(JSON.stringify(data));if(!u[mk])u[mk]={days:{},weightLog:[]};u[mk].days[dk]={calories:parseInt(form.calories)||0,mood:form.mood,notes:form.notes,logged:new Date().toISOString()};if(form.weight)u[mk].weightLog=[...(u[mk].weightLog||[]).filter(w=>w.date!==dk),{date:dk,weight:parseFloat(form.weight)}].sort((a,b)=>a.date.localeCompare(b.date));persist(u);setSaving(false);setShowModal(false);setForm({weight:"",mood:3,notes:"",calories:""});};
  const delDay=(mk,dk)=>{const u=JSON.parse(JSON.stringify(data));if(u[mk]?.days?.[dk])delete u[mk].days[dk];persist(u);};
  const md=data[vm]||{days:{},weightLog:[]};const days=md.days||{},wl=md.weightLog||[];
  const[yr,mo]=vm.split("-").map(Number);const fd=new Date(yr,mo-1,1).getDay(),dim=new Date(yr,mo,0).getDate(),today=todayKey();
  const ld=Object.values(days),avgCal=ld.length?Math.round(ld.reduce((a,d)=>a+(d.calories||0),0)/ld.length):0;const avgMood=ld.length?(ld.reduce((a,d)=>a+(d.mood||3),0)/ld.length).toFixed(1):"-";const dot=ld.filter(d=>d.calories>0&&d.calories<=(profile?.calories||1650)).length;
  const wS=wl[0]?.weight,wE=wl[wl.length-1]?.weight,wD=(wS&&wE)?(wE-wS).toFixed(1):null;
  const cc=cal=>{if(!cal)return C.empty;if(cal<=(profile?.calories||1650))return C.accentGreen+"99";if(cal<=(profile?.calories||1650)*1.1)return"#c09020";return C.over};
  const months=[];const now=new Date();for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}
  const inp={background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"10px 12px",fontSize:"18px",color:C.text,outline:"none",width:"100%"};
  if(loading)return <div style={{textAlign:"center",padding:"40px",color:C.textDim,fontFamily:"Georgia,serif"}}>Cargando…</div>;
  return(<div style={{display:"flex",flexDirection:"column",gap:"14px",paddingBottom:"24px"}}>
    <FadeIn><div style={{display:"flex",gap:"8px",alignItems:"center"}}><select value={vm} onChange={e=>setVm(e.target.value)} style={{flex:1,padding:"9px 12px",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.surface,fontSize:"18px",color:C.text,outline:"none"}}>{months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}</select><button onClick={()=>setShowModal(true)} style={{background:C.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"9px 14px",cursor:"pointer",fontSize:"18px",fontFamily:"Georgia,serif",fontWeight:700,whiteSpace:"nowrap"}}>+ Registrar hoy</button></div></FadeIn>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"8px"}}>{[{l:"Registrados",v:`${ld.length}`,s:`de ${dim}`,c:C.text},{l:"Kcal prom.",v:avgCal||"—",s:"/día",c:avgCal&&avgCal<=(profile?.calories||1650)?C.accentGreen:C.over},{l:"En meta",v:dot,s:"días ✓",c:C.accentGreen},{l:"Humor",v:avgMood,s:MOODS.find(m=>m.v===Math.round(parseFloat(avgMood)||3))?.e||"",c:C.accent}].map((s,i)=>(<FadeIn key={s.l} delay={i*0.05}><Card style={{padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:"19px",fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div><div style={{fontSize:"19px",color:C.textMid,marginTop:"2px",fontFamily:"Georgia,serif"}}>{s.s}</div><div style={{fontSize:"18px",color:C.textDim,marginTop:"2px",fontFamily:"Georgia,serif"}}>{s.l}</div></Card></FadeIn>))}</div>
    {wl.length>0&&<FadeIn delay={0.1}><Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}><SLabel>⚖ Peso</SLabel><button onClick={()=>setShowChart(!showChart)} style={{fontSize:"18px",fontFamily:"Georgia,serif",background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:"6px",padding:"3px 9px",cursor:"pointer",color:C.textMid}}>{showChart?"ocultar":"ver gráfica"}</button></div>
      <div style={{display:"flex",gap:"16px",alignItems:"center"}}><div><div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif"}}>Inicio</div><div style={{fontSize:"18px",fontWeight:700,color:C.text}}>{wS} kg</div></div>{wl.length>1&&<><div style={{flex:1,height:"1px",background:C.border}}/><div style={{textAlign:"center"}}><div style={{fontSize:"18px",fontWeight:700,color:parseFloat(wD)<0?C.accentGreen:parseFloat(wD)>0?C.over:C.textMid}}>{parseFloat(wD)>0?"+":""}{wD} kg</div><div style={{fontSize:"19px",color:C.textDim,fontFamily:"Georgia,serif"}}>{parseFloat(wD)<0?"perdido 🎉":parseFloat(wD)>0?"ganado":"sin cambio"}</div></div><div style={{flex:1,height:"1px",background:C.border}}/><div style={{textAlign:"right"}}><div style={{fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif"}}>Ahora</div><div style={{fontSize:"18px",fontWeight:700,color:C.text}}>{wE} kg</div></div></>}</div>

    </Card></FadeIn>}
    <FadeIn delay={0.15}><Card><SLabel>Calendario · {fmtMonth(vm)}</SLabel>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",marginBottom:"6px"}}>{["D","L","M","X","J","V","S"].map(d=><div key={d} style={{textAlign:"center",fontSize:"19px",color:C.textDim,fontFamily:"Georgia,serif"}}>{d}</div>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px"}}>{Array(fd===0?6:fd-1).fill(null).map((_,i)=><div key={`e${i}`}/>)}{Array(dim).fill(null).map((_,i)=>{const d=i+1,dk=`${vm}-${String(d).padStart(2,"0")}`;const dd=days[dk],isT=dk===today,isFut=dk>today;return(<div key={d} onClick={()=>dd&&delDay(vm,dk)} style={{aspectRatio:"1",borderRadius:"5px",background:isFut?"transparent":dd?cc(dd.calories):C.empty,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",fontFamily:"Georgia,serif",color:C.text,border:isT?`2px solid ${C.accent}`:`1px solid ${C.border}40`,cursor:dd?"pointer":"default",position:"relative",opacity:isFut?0.3:1}}>{d}{dd?.mood&&<span style={{position:"absolute",top:"-3px",right:"-3px",fontSize:"18px"}}>{MOODS.find(m=>m.v===dd.mood)?.e}</span>}</div>);})}</div>

    </Card></FadeIn>
    {ld.length>0&&<FadeIn delay={0.2}><Card><SLabel>📝 Notas</SLabel><div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"200px",overflowY:"auto"}}>{Object.entries(days).sort((a,b)=>b[0].localeCompare(a[0])).map(([dk,d])=>d.notes&&<div key={dk} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}><div style={{minWidth:"42px",fontSize:"18px",color:C.textDim,fontFamily:"Georgia,serif"}}>{fmtDate(dk)}</div><div style={{flex:1,fontSize:"18px",color:C.textMid,lineHeight:1.4,fontStyle:"italic"}}>"{d.notes}"</div><div style={{fontSize:"19px"}}>{MOODS.find(m=>m.v===d.mood)?.e}</div></div>)}</div></Card></FadeIn>}

        <button onClick={logToday} disabled={saving||!form.calories} style={{padding:"13px",background:saving||!form.calories?C.surfaceAlt:C.accent,color:saving||!form.calories?C.textDim:"#fff",border:"none",borderRadius:"12px",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:700}}>{saving?"Guardando…":"Guardar ✓"}</button>
      </div>
    </div></SlideUp>
  </div>);
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function MainApp({profile,onResetProfile}){
  const SYSTEM_PROMPT = buildSystemPrompt(profile);
  const todayStr = new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
  const[meals,setMeals]=useState([]);const[activity,setActivity]=useState({steps:0,burnedCal:0,workout:"",workoutEmoji:"",lastUpdated:null});
  const[messages,setMessages]=useState([{role:"assistant",type:"chat",message:`¡Hola, ${profile.name}! Soy NutrIA 🦦\n\nHoy es ${todayStr}. Tu meta: **${profile.calories} kcal**.\n\n¿Empezamos?`}]);
  const[input,setInput]=useState("");const[image,setImage]=useState(null);const[imgPreview,setImgPreview]=useState(null);
  const[loading,setLoading]=useState(false);const[tab,setTab]=useState("chat");const[showProfile,setShowProfile]=useState(false);
  const[showScanner,setShowScanner]=useState(false);const[showProducts,setShowProducts]=useState(false);const[showRecipes,setShowRecipes]=useState(false);const[toast,setToast]=useState(null);
  const fileRef=useRef();const chatRef=useRef();

  const burnedTotal=activity.burnedCal||Math.round((activity.steps||0)*KCAL_PER_STEP);
  const calBonus=Math.round(burnedTotal*EXERCISE_RECOVER);
  const adjustedCal=profile.calories+calBonus;
  const totals=meals.reduce((a,m)=>({calories:a.calories+m.calories,protein:a.protein+m.protein,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{calories:0,protein:0,carbs:0,fat:0});
  const rem=adjustedCal-totals.calories,over=totals.calories>adjustedCal,calPct=Math.min(100,Math.round((totals.calories/adjustedCal)*100));

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages,loading]);

  const handleActivityChange=async a=>{setActivity(a);const nb=Math.round((a.burnedCal||Math.round((a.steps||0)*KCAL_PER_STEP))*EXERCISE_RECOVER);const nm=profile.calories+nb;setToast(`🎯 Meta ajustada a ${nm} kcal`);const msg=`He registrado mi actividad: ${a.steps>0?`${a.steps.toLocaleString("es-ES")} pasos`:""}${a.workout?` + ${a.workout} (${a.burnedCal} kcal quemadas)`:""}. Meta hoy: ${nm} kcal.`;setMessages(p=>[...p,{role:"user",text:msg}]);setLoading(true);try{const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:SYSTEM_PROMPT,messages:[{role:"user",content:msg}]})});const data=await res.json();const raw=data.content?.map(c=>c.text||"").join("")||"{}";let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{parsed={type:"chat",message:raw};}setMessages(p=>[...p,{role:"assistant",...parsed}]);}catch(e){console.error(e);}setLoading(false);};

  const addMeal=m=>{const meal={...m,id:Date.now(),emoji:m.emoji||"🍽",feedback:m.feedback||""};setMeals(p=>[...p,meal]);setMessages(p=>[...p,{role:"assistant",type:"meal",...meal,feedback:`¡Registrado! ${m.name} añadido.`}]);setShowScanner(false);setShowProducts(false);setShowRecipes(false);};
  const handleBarcodeResult=(calc,raw)=>{if(raw?.barcode){const ex=ST.get("nutria-products")||[];if(!ex.find(p=>p.barcode===raw.barcode)){ST.set("nutria-products",[{name:raw.name,brand:raw.brand||"",barcode:raw.barcode,image:raw.image||null,per100:{calories:raw.calories,protein:raw.protein,carbs:raw.carbs,fat:raw.fat}},...ex]);setToast("📦 Guardado en Mis productos");}}addMeal({name:calc.name,emoji:"📦",calories:calc.calories,protein:calc.protein,carbs:calc.carbs,fat:calc.fat});};
  const handleImg=e=>{const f=e.target.files[0];if(!f)return;setImage(f);const r=new FileReader();r.onload=ev=>setImgPreview(ev.target.result);r.readAsDataURL(f);};
  const buildHistory=(si,sid,sit)=>{const h=[];for(const msg of messages){if(msg.role==="user")h.push(msg.imageData?{role:"user",content:[{type:"image",source:{type:"base64",media_type:msg.imageType,data:msg.imageData}},{type:"text",text:msg.text||"Analiza"}]}:{role:"user",content:msg.text});else{const j=msg.type==="meal"?JSON.stringify({type:"meal",name:msg.name,emoji:msg.emoji,calories:msg.calories,protein:msg.protein,carbs:msg.carbs,fat:msg.fat,feedback:msg.feedback}):JSON.stringify({type:msg.type||"chat",message:msg.message});h.push({role:"assistant",content:j});}}h.push({role:"user",content:sid?[{type:"image",source:{type:"base64",media_type:sit,data:sid}},{type:"text",text:si||"Analiza"}]:si});return h;};
  const send=async()=>{if(!input.trim()&&!image)return;setLoading(true);const um={role:"user",text:input};if(image&&imgPreview){um.imageData=imgPreview.split(",")[1];um.imageType=image.type;um.imagePreview=imgPreview;}setMessages(p=>[...p,um]);const si=input,sid=um.imageData||null,sit=um.imageType||null;setInput("");setImage(null);setImgPreview(null);try{const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:buildHistory(si,sid,sit)})});const data=await res.json();const raw=data.content?.map(c=>c.text||"").join("")||"{}";let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{parsed={type:"chat",message:raw};}if(parsed.type==="meal")setMeals(p=>[...p,{...parsed,id:Date.now()}]);setMessages(p=>[...p,{role:"assistant",...parsed}]);}catch{setMessages(p=>[...p,{role:"assistant",type:"chat",message:"Error de conexión 🦦 Inténtalo de nuevo."}]);}setLoading(false);};
  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  const renderMsg=(msg,i)=>{
    const isUser=msg.role==="user";
    return(<FadeIn key={i} delay={0} y={6}>
      <div style={{display:"flex",flexDirection:isUser?"row-reverse":"row",gap:"8px",alignItems:"flex-end"}}>
        {!isUser&&<OtterAvatar avatarId={profile.avatar}/>}
        <div style={{maxWidth:"82%",padding:"12px 15px",borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",background:isUser?C.accent:msg.type==="support"?"#f5efd8":C.surface,color:isUser?"#fff":C.text,fontSize:"19px",lineHeight:"1.6",border:`1px solid ${isUser?C.accent:msg.type==="support"?"#d4c090":C.border}`,borderLeft:msg.type==="support"?`3px solid ${C.accent}`:undefined}}>
          {msg.imagePreview&&<img src={msg.imagePreview} alt="" style={{width:"100%",borderRadius:"10px",marginBottom:"8px",maxHeight:"160px",objectFit:"cover"}}/>}
          {isUser?<span>{msg.text}</span>:msg.type==="meal"?(
            <div><div style={{fontSize:"22px",marginBottom:"4px"}}>{msg.emoji}</div><div style={{fontFamily:"Georgia,serif",fontWeight:700,marginBottom:"8px",color:C.text}}>{msg.name}</div><MacroChips calories={msg.calories} protein={msg.protein} carbs={msg.carbs} fat={msg.fat}/>{msg.feedback&&<p style={{margin:"8px 0 0",fontSize:"18px",color:C.textMid,lineHeight:1.5}}>{msg.feedback}</p>}</div>
          ):(
            <span style={{whiteSpace:"pre-wrap"}}>
              {msg.type==="support"&&<span style={{display:"block",marginBottom:"6px",fontSize:"18px"}}>🤍</span>}
              {(msg.message||"").split("**").map((p,j)=>j%2===1?<strong key={j} style={{color:isUser?"#fff":C.accent}}>{p}</strong>:p)}
            </span>
          )}
        </div>
      </div>
    </FadeIn>);
  };

  const TABS=[["chat","💬 Chat"],["meals",`🍽 Hoy (${meals.length})`],["monthly","📅 Mensual"]];
  const quick=["¿Cómo voy hoy?","Tengo un antojo 😩","Me siento culpable","¿Qué ceno?","Necesito apoyo"];

  return(<div style={{minHeight:"100vh",background:C.bg,fontFamily:"Georgia,serif",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:"24px"}}>
    <Toast msg={toast} onDone={()=>setToast(null)}/>
    <div style={{width:"100%",maxWidth:"500px",padding:"22px 20px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

        <div>
          <div style={{fontSize:"19px",letterSpacing:"0.22em",color:C.textOnDark,fontFamily:"Georgia,serif",lineHeight:1,fontWeight:700}}>hola, {profile.name.toLowerCase()}</div>
          <h1 style={{margin:"3px 0 0",fontSize:"32px",fontFamily:"Georgia,serif",fontWeight:700,color:C.surface,letterSpacing:"-0.3px",lineHeight:1}}>Nutr<span style={{color:C.accent}}>IA</span></h1>

    </div>

    {showProfile&&<FadeIn><div style={{width:"100%",maxWidth:"500px",padding:"0 20px 12px"}}><Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}><OtterLogoColored size={32} body={(AVATARS.find(a=>a.id===profile.avatar)||AVATARS[1]).body} belly={(AVATARS.find(a=>a.id===profile.avatar)||AVATARS[1]).belly}/><div><div style={{fontSize:"19px",color:C.textDim,fontFamily:"Georgia,serif"}}>Tu objetivo</div><div style={{fontSize:"19px",fontFamily:"Georgia,serif",color:C.text,marginTop:"1px"}}>{GOAL_ADJUSTMENTS[profile.goal]?.label}</div></div></div>
        <button onClick={onResetProfile} style={{fontSize:"19px",fontFamily:"Georgia,serif",background:C.goodBg,border:`1px solid ${C.accentGreen}60`,borderRadius:"6px",padding:"4px 10px",cursor:"pointer",color:C.accentGreen,fontWeight:700}}>Editar</button>

      <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>{[["🔥",`${profile.calories} kcal`,C.accent],["🥩",`${profile.protein}g`,C.accentGreen],["🌾",`${profile.carbs}g`,"#b07818"],["🥑",`${profile.fat}g`,"#8058a8"]].map(([ico,v,col])=><span key={v} style={{fontSize:"18px",background:C.surfaceAlt,borderRadius:"8px",padding:"3px 10px",border:`1px solid ${C.border}`,color:col,fontWeight:700}}>{ico} {v}</span>)}</div>
    </Card></div></FadeIn>}

    {tab!=="monthly"&&<div style={{width:"100%",maxWidth:"500px",padding:"0 20px 14px",display:"flex",flexDirection:"column",gap:"10px"}}>

      {TABS.map(([t,label])=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 4px",borderRadius:"12px",border:`1px solid ${tab===t?C.accent:C.border}`,cursor:"pointer",background:tab===t?C.accent:C.surface,color:tab===t?"#fff":C.textMid,fontSize:"18px",fontFamily:"Georgia,serif",transition:"all 0.25s",whiteSpace:"nowrap",fontWeight:tab===t?700:400}}>{label}</button>)}

        <div ref={chatRef} style={{overflowY:"auto",maxHeight:"340px",display:"flex",flexDirection:"column",gap:"12px",paddingBottom:"12px"}}>
          {messages.map(renderMsg)}
          {loading&&<div style={{display:"flex",gap:"8px",alignItems:"flex-end"}}><OtterAvatar avatarId={profile.avatar}/><div style={{background:C.surface,borderRadius:"18px 18px 18px 4px",padding:"12px 16px",border:`1px solid ${C.border}`}}><Dots/></div></div>}
        </div>
        <div style={{paddingTop:"10px"}}>
          {imgPreview&&<div style={{position:"relative",display:"inline-block",marginBottom:"8px"}}><img src={imgPreview} alt="" style={{height:"64px",borderRadius:"10px",objectFit:"cover",border:`1px solid ${C.border}`}}/><button onClick={()=>{setImage(null);setImgPreview(null);}} style={{position:"absolute",top:"-6px",right:"-6px",width:"18px",height:"18px",borderRadius:"50%",background:C.accent,color:"#fff",border:"none",cursor:"pointer",fontSize:"19px",fontWeight:700}}>✕</button></div>}
          <div style={{display:"flex",gap:"7px",marginBottom:"9px"}}>
            {[{icon:"📷",label:"Foto",action:()=>fileRef.current.click()},{icon:"〒",label:"Barras",action:()=>setShowScanner(true)},{icon:"📦",label:"Productos",action:()=>setShowProducts(true)},{icon:"📖",label:"Recetas",action:()=>setShowRecipes(true)}].map(b=>(
              <button key={b.label} className="abtn" onClick={b.action} style={{flex:1,padding:"9px 4px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:"11px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",transition:"all 0.15s"}}>
                <span style={{fontSize:"19px"}}>{b.icon}</span><span style={{fontSize:"18px",fontFamily:"Georgia,serif",color:C.textMid}}>{b.label}</span>
              </button>
            ))}
          </div>
          <input type="file" accept="image/*" ref={fileRef} onChange={handleImg} style={{display:"none"}}/>
          <div style={{background:C.surface,borderRadius:"16px",padding:"10px 12px",border:`1px solid ${C.border}`,display:"flex",gap:"8px",alignItems:"flex-end"}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder={`Cuéntame, ${profile.name.split(" ")[0]}…`} rows={2} style={{flex:1,border:"none",outline:"none",fontSize:"19px",color:C.text,background:"transparent",lineHeight:"1.5",maxHeight:"90px",overflowY:"auto"}}/>
            <button onClick={send} disabled={loading||(!input.trim()&&!image)} style={{background:(loading||(!input.trim()&&!image))?C.surfaceAlt:C.accent,border:"none",borderRadius:"10px",width:"38px",height:"38px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:(loading||(!input.trim()&&!image))?C.textDim:"#fff",fontWeight:700,fontSize:"18px"}}>→</button>
          </div>
          <div style={{display:"flex",gap:"6px",marginTop:"8px",flexWrap:"wrap"}}>
            {quick.map(a=><button key={a} className="qbtn" onClick={()=>setInput(a)} style={{fontSize:"18px",fontFamily:"Georgia,serif",background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"5px 10px",cursor:"pointer",color:C.textMid,transition:"all 0.15s"}}>{a}</button>)}
          </div>
        </div>
      </>}

      {tab==="meals"&&<div style={{overflowY:"auto",maxHeight:"460px",display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"10px"}}>
        {meals.length===0
          ?<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{display:"flex",justifyContent:"center",marginBottom:"14px",opacity:0.5}}><OtterLogo size={52}/></div><div style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"18px",color:C.textMid}}>Aún no has registrado comidas hoy</div></div>
          :<>{meals.map((meal,i)=><FadeIn key={meal.id} delay={i*0.04}><Card><div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}><div style={{fontSize:"26px",paddingTop:"2px"}}>{meal.emoji}</div><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><div style={{fontFamily:"Georgia,serif",fontWeight:700,color:C.text,fontSize:"19px"}}>{meal.name}</div><span style={{fontSize:"19px",color:C.textDim,fontFamily:"Georgia,serif"}}>#{i+1}</span></div><MacroChips calories={meal.calories} protein={meal.protein} carbs={meal.carbs} fat={meal.fat}/>{meal.feedback&&<p style={{margin:"6px 0 0",fontSize:"18px",color:C.textMid,fontStyle:"italic",lineHeight:1.4}}>{meal.feedback}</p>}</div></div></Card></FadeIn>)}
          <FadeIn delay={meals.length*0.04}><div style={{background:over?C.overBg:C.goodBg,borderRadius:"14px",padding:"13px 16px",border:`1px solid ${over?C.over+"60":C.accentGreen+"60"}`}}><div style={{fontSize:"18px",fontFamily:"Georgia,serif",color:over?C.over:C.accentGreen,fontWeight:700,marginBottom:"3px"}}>{over?"⚠ Has superado la meta":"✓ Dentro de tu meta"}</div><div style={{fontSize:"18px",color:C.textMid}}>{over?`${totals.calories} kcal · ${Math.abs(rem)} de exceso`:`${totals.calories} / ${adjustedCal} kcal · quedan ${rem}`}</div></div></FadeIn></>}
      </div>}

      {tab==="monthly"&&<MonthlyTracker profile={profile}/>}
    </div>

    <SlideUp show={showScanner} onClose={()=>setShowScanner(false)}><BarcodeScanner onResult={handleBarcodeResult} onClose={()=>setShowScanner(false)}/></SlideUp>
    <SlideUp show={showProducts} onClose={()=>setShowProducts(false)}><ProductsLibrary onSelect={m=>addMeal(m)} onClose={()=>setShowProducts(false)}/></SlideUp>
    <SlideUp show={showRecipes} onClose={()=>setShowRecipes(false)}><RecipesLibrary onSelect={m=>addMeal(m)} onClose={()=>setShowRecipes(false)}/></SlideUp>
  </div>);
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(()=>ST.get("nutria-profile"));
  const [editing,setEditing]=useState(false);
  const startEdit=()=>setEditing(true);
  const finishEdit=p=>{setProfile(p);setEditing(false);};
  if(!profile||editing) return <Onboarding onComplete={finishEdit} initialData={editing?profile:null}/>;
  return <MainApp profile={profile} onResetProfile={startEdit}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
